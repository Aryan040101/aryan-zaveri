name: public-repo-checks

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run demo tests
        run: python -m unittest discover examples/research_to_execution_demo/tests

      - name: Run synthetic demo
        run: python examples/research_to_execution_demo/run_demo.py

      - name: Build C++ live runtime demo
        run: g++ -std=c++20 -O2 -Wall -Wextra -pedantic -pthread examples/cpp_live_runtime_demo/live_runtime_demo.cpp -o /tmp/live_runtime_demo

      - name: Run C++ live runtime demo
        run: /tmp/live_runtime_demo | python -m json.tool > /tmp/live_runtime_demo.json

      - name: Build modular C++ trading runtime
        run: g++ -std=c++20 -O2 -Wall -Wextra -pedantic -pthread -Iexamples/cpp_trading_runtime/include examples/cpp_trading_runtime/src/*.cpp -o /tmp/cpp_trading_runtime

      - name: Run modular C++ trading runtime
        run: /tmp/cpp_trading_runtime | python -m json.tool > /tmp/cpp_trading_runtime.json

      - name: Validate message contract examples
        run: python tools/validate_contract_examples.py

      - name: Run public repository checks
        run: python tools/check_public_repo.py
